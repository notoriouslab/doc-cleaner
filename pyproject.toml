[tool.briefcase]
project_name = "DocCleaner"
bundle = "com.notoriouslab"
version = "1.4.0"
url = "https://github.com/notoriouslab/doc-cleaner"
license = "MIT"
license-files = ["LICENSE"]
author = "notoriouslab"
author_email = "sitedirector@gmail.com"

[tool.briefcase.app.macapp]
formal_name = "Doc Cleaner"
description = "Convert documents to clean Markdown. Zero config, zero API key."
icon = "resources/icon"
sources = [
    "macapp",
    "core.py",
    "cleaner.py",
    "parsers",
    "classifiers",
    "ai",
    "output",
    "prompts",
]
# proxy_tools is a pywebview dependency available only as source on PyPI.
# Briefcase uses --only-binary :all: which blocks source installs.
# The vendored wheel in vendor_wheels/ provides a binary-compatible wheel.
# requirement_installer_args adds --find-links so pip finds it by version pin
# without an absolute path (Briefcase resolves relative paths automatically).
requirement_installer_args = [
    "--find-links=vendor_wheels",
]
requires = [
    # Vendored wheel — sourced from: pip wheel proxy_tools --no-deps -w vendor_wheels/
    "proxy_tools==0.1.0",
    # GUI
    "pywebview==6.2.1",
    # PDF / document parsing
    "PyMuPDF>=1.23.0",
    "python-docx>=0.8.11",
    # Spreadsheets — pandas pinned for cross-arch determinism (D3)
    "pandas==2.2.3",
    "numpy>=2.4,<3",
    "openpyxl>=3.0.0",
    "xlrd>=2.0.1",
    # Presentation — pin to 0.6.x; 1.0.x has API breaking changes vs 0.6.x
    "python-pptx>=0.6.21,<1.0.0",
    # DXF engineering drawings
    "ezdxf>=1.0.0",
    # Image support (PDF vision mode, not bundled in GUI but pulled by PyMuPDF)
    "Pillow>=9.0.0",
    # tabulate: required by pandas.DataFrame.to_markdown() for pipe-table output
    "tabulate>=0.8.0",
    # Excluded per design D1: pdf2image, pikepdf, poppler, google-genai, ollama
]

[tool.briefcase.app.macapp.macOS]
requires = []

[tool.briefcase.app.macapp.windows]
requires = []
# numpy: pin to a version with win_amd64 wheels for Python 3.12
# (pandas==2.2.3 is already pinned in the app-level requires above)
